name: youtube-daily-to-study

on:
  workflow_dispatch:
    inputs:
      test_latest:
        description: 'Manual test: analyze latest video per channel (ignores today filter)'
        required: false
        default: 'false'
  schedule:
    # 07:00 Asia/Shanghai = 23:00 UTC (previous day)
    - cron: '0 23 * * *'

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout timetable
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup yt-dlp (with EJS challenge solver)
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ejs-node: true

      - name: Write YouTube cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          printf '%s' "$YOUTUBE_COOKIES" > youtube_cookies.txt

      - name: Run pipeline (YouTube RSS -> jiangshu-study)
        env:
          STUDY_PUSH_TOKEN: ${{ secrets.STUDY_PUSH_TOKEN }}
          STUDY_REPO: 'https://github.com/Health-525/jiangshu-study.git'
          OUT_DIR_REL: 'youtube-daily'
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MAX_ANALYZE: '5'
          TEST_LATEST: ${{ github.event.inputs.test_latest }}
          YOUTUBE_COOKIES_FILE: youtube_cookies.txt
        run: |
          node scripts/youtube_daily_to_study.js
