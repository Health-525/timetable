name: youtube-daily-to-study

on:
  workflow_dispatch:
  schedule:
    # 07:00 Asia/Shanghai = 23:00 UTC (previous day)
    - cron: '0 23 * * *'

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout timetable
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python (for yt-dlp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Run pipeline (YouTube RSS -> jiangshu-study)
        env:
          STUDY_PUSH_TOKEN: ${{ secrets.STUDY_PUSH_TOKEN }}
          STUDY_REPO: 'https://github.com/Health-525/jiangshu-study.git'
          OUT_DIR_REL: 'youtube-daily'
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MAX_ANALYZE: '5'
        run: |
          node scripts/youtube_daily_to_study.js
