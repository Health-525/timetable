name: wechat-daily-to-study

on:
  workflow_dispatch:
  schedule:
    # 08:10 UTC daily
    - cron: '10 8 * * *'

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout timetable
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run pipeline (Coze -> jiangshu-study)
        env:
          COZE_API_KEY: ${{ secrets.COZE_API_KEY }}
          STUDY_PUSH_TOKEN: ${{ secrets.STUDY_PUSH_TOKEN }}
          WORKFLOW_ID: '7617432622935851034'
          STUDY_REPO: 'https://github.com/Health-525/jiangshu-study.git'
        run: |
          node scripts/wechat_daily_to_jiangshu_study.js
