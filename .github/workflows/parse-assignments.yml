name: parse-assignments

on:
  repository_dispatch:
    types: [assignments-push]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout timetable
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.STUDY_PUSH_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clone jiangshu-study
        env:
          STUDY_PUSH_TOKEN: ${{ secrets.STUDY_PUSH_TOKEN }}
        run: |
          git clone "https://x-access-token:${STUDY_PUSH_TOKEN}@github.com/Health-525/jiangshu-study.git" _study

      - name: Parse assignments from 作业.md
        run: |
          if [ -f "_study/09-日常处理/作业.md" ]; then
            node scripts/parse_assignments.js \
              --note _study/09-日常处理/作业.md \
              --data data/assignments.json
          else
            echo "作业.md 不存在，跳过"
          fi

      - name: Commit assignments.json
        run: |
          git config user.name "timetable-bot"
          git config user.email "timetable-bot@users.noreply.github.com"
          git add data/assignments.json
          git diff --cached --quiet || git commit -m "feat: update assignments from Obsidian"
          git push

      - name: Push updated 作业.md back to jiangshu-study
        env:
          STUDY_PUSH_TOKEN: ${{ secrets.STUDY_PUSH_TOKEN }}
        run: |
          cd _study
          git config user.name "timetable-bot"
          git config user.email "timetable-bot@users.noreply.github.com"
          git pull --rebase "https://x-access-token:${STUDY_PUSH_TOKEN}@github.com/Health-525/jiangshu-study.git" main
          git add 09-日常处理/作业.md
          git diff --cached --quiet || git commit -m "chore: update 作业.md reminder list"
          git push "https://x-access-token:${STUDY_PUSH_TOKEN}@github.com/Health-525/jiangshu-study.git" HEAD:main
