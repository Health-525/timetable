name: 处理调课

on:
  repository_dispatch:
    types: [adjustments-push]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取 timetable 仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.STUDY_PUSH_TOKEN }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 克隆 jiangshu-study
        env:
          STUDY_PUSH_TOKEN: ${{ secrets.STUDY_PUSH_TOKEN }}
        run: |
          git clone "https://x-access-token:${STUDY_PUSH_TOKEN}@github.com/Health-525/jiangshu-study.git" _study

      - name: 检查调课.md是否存在
        id: check
        run: |
          if [ -f "_study/09-日常处理/调课.md" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "调课.md 不存在，跳过"
          fi

      - name: 解析调课.md，更新 adjustments.json
        if: steps.check.outputs.exists == 'true'
        run: |
          node scripts/parse_adjustments.js \
            --note _study/09-日常处理/调课.md \
            --adj data/adjustments.json

      - name: 提交 adjustments.json 到 timetable
        if: steps.check.outputs.exists == 'true'
        run: |
          git config user.name "timetable-bot"
          git config user.email "timetable-bot@users.noreply.github.com"
          git add data/adjustments.json
          git diff --cached --quiet || git commit -m "feat: apply schedule adjustments from Obsidian"
          git pull --rebase origin main
          git push

      - name: 将更新后的调课.md 推送回 jiangshu-study
        if: steps.check.outputs.exists == 'true'
        env:
          STUDY_PUSH_TOKEN: ${{ secrets.STUDY_PUSH_TOKEN }}
        run: |
          cd _study
          git config user.name "timetable-bot"
          git config user.email "timetable-bot@users.noreply.github.com"
          git pull --rebase "https://x-access-token:${STUDY_PUSH_TOKEN}@github.com/Health-525/jiangshu-study.git" main
          git add 09-日常处理/调课.md
          git diff --cached --quiet || git commit -m "chore: archive processed adjustments"
          git push "https://x-access-token:${STUDY_PUSH_TOKEN}@github.com/Health-525/jiangshu-study.git" HEAD:main
