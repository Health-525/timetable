name: 同步YouTube笔记

on:
  workflow_dispatch:
    inputs:
      test_latest:
        description: '手动测试：分析每个频道最新视频（忽略今日过滤）'
        required: false
        default: 'false'
  schedule:
    # 每天北京时间 07:00 = UTC 23:00（前一天）
    - cron: '0 23 * * *'

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取 timetable 仓库
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ejs-node: true

      - name: 写入 YouTube Cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          printf '%s' "$YOUTUBE_COOKIES" > youtube_cookies.txt

      - name: 运行 YouTube 笔记同步脚本
        env:
          STUDY_PUSH_TOKEN: ${{ secrets.STUDY_PUSH_TOKEN }}
          STUDY_REPO: 'https://github.com/Health-525/jiangshu-study.git'
          OUT_DIR_REL: 'youtube-daily'
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          MAX_ANALYZE: '11'
          TEST_LATEST: ${{ github.event.inputs.test_latest }}
          YOUTUBE_COOKIES_FILE: youtube_cookies.txt
        run: |
          node scripts/youtube_daily_to_study.js
